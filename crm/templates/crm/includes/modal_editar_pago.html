<div class="modal fade" id="modalEditarPago{{ pago.id }}" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
            
            <div class="modal-header bg-primary text-white border-bottom-0">
                <h6 class="modal-title fw-bold">
                    <i class="fa-solid fa-pen-to-square me-2"></i>Editar Cobro Registrado
                </h6>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            
            <form action="{% url 'crm:editar_pago' pago.id %}" method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="modal-body bg-light text-start">
                    
                    <div class="card mb-3 border-primary border-opacity-25">
                        <div class="card-body py-2">
                            <div class="row">
                                <div class="col-7 border-end">
                                    <small class="text-muted d-block text-uppercase" style="font-size: 0.70rem;">Titular</small>
                                    <span class="fw-bold text-dark">{{ pago.expediente.deudor_nombre }}</span>
                                </div>
                                <div class="col-5">
                                    <small class="text-muted d-block text-uppercase" style="font-size: 0.70rem;">Teléfono</small>
                                    <span class="fw-bold text-dark">{{ pago.expediente.deudor_telefono }}</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="card mb-3 border-primary border-opacity-25">
                        <div class="card-body py-2">
                            <div class="row">
                                <div class="col-6 border-end">
                                    <small class="text-muted d-block text-uppercase" style="font-size: 0.70rem;">Total Original</small>
                                    <span class="fw-bold text-dark">{{ pago.expediente.monto_original }} €</span>
                                </div>
                                <div class="col-6">
                                    <small class="text-muted d-block text-uppercase" style="font-size: 0.70rem;">Deuda Pendiente</small>
                                    <span class="fw-bold text-danger">{{ pago.expediente.monto_actual }} €</span> 
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="row g-2">
                        <div class="col-6">
                            <label class="form-label small fw-bold text-muted">Fecha Pago</label>
                            <input type="date" name="fecha_pago" class="form-control" value="{{ pago.fecha_pago|date:'Y-m-d' }}" required>
                        </div>
                        <div class="col-6">
                            <label class="form-label small fw-bold text-muted">Monto (€)</label>
                            <div class="input-group">
                                <input type="number" step="0.01" name="monto" class="form-control fw-bold text-primary" value="{{ pago.monto|stringformat:'.2f' }}" required>
                                <span class="input-group-text">€</span>
                            </div>
                        </div>
                        <div class="col-6">
                            <label class="form-label small fw-bold text-muted">Descuento / Quita (€)</label>
                            <div class="input-group input-group-sm">
                                <span class="input-group-text bg-warning bg-opacity-10 text-warning border-warning"><i class="fa-solid fa-tag"></i></span>
                                <input type="number" step="0.01" name="descuento" class="form-control border-warning border-opacity-50" value="{{ pago.descuento|stringformat:'.2f' }}" min="0">
                            </div>
                        </div>
                        <div class="col-12 mb-2">
                            <label class="form-label small fw-bold text-muted">Método de Pago</label>
                            <select name="metodo_pago" class="form-select form-select-sm">
                                <option value="TRANSFERENCIA" {% if pago.metodo_pago == 'TRANSFERENCIA' %}selected{% endif %}>Transferencia Bancaria</option>
                                {% if pago.expediente.estado == 'CEDIDO' %}
                                    <option value="SEQURA_PASS" {% if pago.metodo_pago == 'SEQURA_PASS' %}selected{% endif %}>SeQura Pass</option>
                                {% else %}
                                    {% if pago.expediente.tipo_producto == 'SEQURA_HOTMART' %}
                                        <option value="SEQURA_HOTMART" {% if pago.metodo_pago == 'SEQURA_HOTMART' %}selected{% endif %}>Pasarela SeQura Hotmart</option>
                                    {% elif pago.expediente.tipo_producto == 'SEQURA_MANUAL' %}
                                        <option value="SEQURA_MANUAL" {% if pago.metodo_pago == 'SEQURA_MANUAL' %}selected{% endif %}>Pasarela SeQura Manual</option>
                                    {% elif pago.expediente.tipo_producto == 'SEQURA_COPECART' %}
                                        <option value="SEQURA_COPECART" {% if pago.metodo_pago == 'SEQURA_COPECART' %}selected{% endif %}>Pasarela SeQura Copecart</option>
                                    {% elif pago.expediente.tipo_producto == 'AUTO_STRIPE' %}
                                        <option value="STRIPE" {% if pago.metodo_pago == 'STRIPE' %}selected{% endif %}>Stripe</option>
                                    {% elif pago.expediente.tipo_producto == 'SEQURA_PASS' %}
                                        <option value="SEQURA_PASS" {% if pago.metodo_pago == 'SEQURA_PASS' %}selected{% endif %}>SeQura Pass</option>
                                    {% endif %}
                                {% endif %}
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label small fw-bold text-muted">Reemplazar Comprobante (Opcional)</label>
                            {% if pago.comprobante %}
                                <div class="mb-1" style="font-size: 0.75rem;">
                                    <span class="text-success"><i class="fa-solid fa-check-circle"></i> Actual:</span> 
                                    <a href="{{ pago.comprobante.url }}" target="_blank" class="text-primary text-decoration-none fw-bold">Ver Archivo</a>
                                </div>
                            {% endif %}
                            <input type="file" name="comprobante" class="form-control form-control-sm">
                        </div>
                    </div>
                </div>
                
                <div class="modal-footer border-top-0 pt-0 bg-light">
                    <button type="button" class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-sm btn-primary fw-bold px-4">Guardar Cambios</button>
                </div>
            </form>
        </div>
    </div>
</div>
